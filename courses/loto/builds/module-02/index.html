}
@keyframes grainShift {
  0% { transform: translate(0, 0); }
  25% { transform: translate(-2%, -1%); }
  50% { transform: translate(1%, 2%); }

}
.slide.active {

}

/* --- Background image support --- */
.slide.has-image {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Dark overlay for text readability — sits between bg image and content */
.slide.has-image::before {
  content: '';

  inset: 0;
  z-index: 1;

  background: radial-gradient(ellipse at center,

}

}

.slide.has-image > * {

  z-index: 2;
}

  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  background: repeating-linear-gradient(

    { "type": "reveal", "kicker": "The Test", "heading": "If nothing happens,\nthe lockout is complete.", "body": "If something DOES happen — if the machine responds, if a light comes on, if something moves — you missed something. Stop. Go back. Re-isolate.", "image": "img/s23-the-test.jpg" },
    { "type": "concept", "label": "Verification Isn't Trust", "boxText": "You don't trust that you got all the energy sources. You test it.", "body": "You push the button and you wait for the silence. After verification, return all controls to OFF or NEUTRAL position. Then inform people in the area that you're about to begin work.", "image": "img/s24-verification.jpg" },

  const slideContainer = document.getElementById('slide-container');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const progressText = document.getElementById('progress-text');
  const progressFill = document.getElementById('progress-fill');

  let currentSlide = 0;
  let isQuizMode = false;
  let quizStartSlide = -1;
  let quizAnswers = [];
  let SCORM_API = null;

  function buildSlides() {
    // Content slides
    MODULE.slides.forEach((slide, index) => {
      const slideEl = document.createElement('div');
      slideEl.className = `slide slide-${slide.type}`;
      slideEl.id = `slide-${index}`;
      
      if (slide.image) {
        slideEl.classList.add('has-image');
        slideEl.style.backgroundImage = `url(${slide.image})`;
      }

      let content = '';
      
      if (slide.type === 'title') {
        content = `
          <div class="module-label">${slide.moduleLabel}</div>
          <h1>${slide.heading.replace(/\n/g, '<br>')}</h1>
          <div class="subtitle">${slide.subtitle}</div>
          <div class="brand">${slide.brand}</div>
        `;
      } else if (slide.type === 'scene') {
        content = `
          <div class="label">${slide.label}</div>
          <div class="text">${slide.text}</div>
        `;
      } else if (slide.type === 'keypoint') {
        content = `
          ${slide.kicker ? `<div class="kicker">${slide.kicker}</div>` : ''}
          <h2>${slide.heading.replace(/\n/g, '<br>')}</h2>
          <div class="body">${slide.body}</div>
        `;
      } else if (slide.type === 'options') {
        const optionsHTML = slide.options.map(opt => `
          <div class="option ${slide.highlighted === opt.letter ? 'highlighted' : ''}">
            <div class="letter">${opt.letter}</div>
            <div class="title">${opt.title}</div>
            <div class="desc">${opt.desc}</div>
          </div>
        `).join('');
        content = `
          <h2>${slide.heading}</h2>
          <div class="options-grid">${optionsHTML}</div>
        `;
      } else if (slide.type === 'reveal') {
        content = `
          ${slide.kicker ? `<div class="kicker">${slide.kicker}</div>` : ''}
          <h2>${slide.heading.replace(/\n/g, '<br>')}</h2>
          <div class="body">${slide.body}</div>
        `;
      } else if (slide.type === 'concept') {
        content = `
          <div class="label">${slide.label}</div>
          <div class="concept-box">
            <div class="text">${slide.boxText}</div>
          </div>
          <div class="body">${slide.body}</div>
        `;
      } else if (slide.type === 'list') {
        const itemsHTML = slide.items.map(item => `
          <div class="list-item">
            <div class="num">${item.num}</div>
            <div class="text">${item.text}</div>
          </div>
        `).join('');
        content = `
          <div class="label">${slide.label}</div>
          <h2>${slide.heading}</h2>
          <div class="list-items">${itemsHTML}</div>
        `;
      } else if (slide.type === 'summary') {
        const itemsHTML = slide.items.map(item => `<div class="summary-item">${item}</div>`).join('');
        content = `
          <h2>${slide.heading}</h2>
          <div class="summary-grid">${itemsHTML}</div>
        `;
      }
      
      slideEl.innerHTML = content;
      slideContainer.appendChild(slideEl);
    });

    // Quiz slides
    if (MODULE.quiz && MODULE.quiz.length > 0) {
      quizStartSlide = MODULE.slides.length;
      
      MODULE.quiz.forEach((q, qIndex) => {
        const slideEl = document.createElement('div');
        slideEl.className = 'slide';
        slideEl.id = `quiz-${qIndex}`;
        
        const optionsHTML = q.options.map((opt, optIndex) => `
          <div class="quiz-option" data-option="${optIndex}">${opt}</div>
        `).join('');
        
        slideEl.innerHTML = `
          <div class="quiz-container">
            <div class="quiz-question">Question ${qIndex + 1} of ${MODULE.quiz.length}<br><br>${q.question}</div>
            <div class="quiz-options">${optionsHTML}</div>
            <div class="quiz-feedback" style="display: none;"></div>
          </div>
        `;
        
        slideContainer.appendChild(slideEl);
        
        // Add click handlers for quiz options
        slideEl.querySelectorAll('.quiz-option').forEach(opt => {
          opt.addEventListener('click', () => answerQuestion(qIndex, parseInt(opt.dataset.option), opt));
        });
      });

      // Results slide
      const resultsSlide = document.createElement('div');
      resultsSlide.className = 'slide';
      resultsSlide.id = 'results';
      resultsSlide.innerHTML = `
        <div class="results-container">
          <div class="results-score" id="results-score">—</div>
          <div class="results-status" id="results-status">—</div>
          <div class="results-details" id="results-details">—</div>
          <div class="results-cta">
            <h3>Get Early Access</h3>
            <p>Join the waitlist for our complete safety training library.</p>
            <input type="email" placeholder="Enter your email" id="waitlist-email">
            <button onclick="joinWaitlist()">Join Waitlist</button>
          </div>
          <div class="results-module-info">Module 2 of 3</div>
          <a href="../module-03/index.html" class="next-module-link">Continue to Module 3</a>
        </div>
      `;
      slideContainer.appendChild(resultsSlide);
    }
  }

  function goToSlide(index) {
    const slides = slideContainer.querySelectorAll('.slide');
    const totalSlides = slides.length;
    
    if (index < 0 || index >= totalSlides) return;
    
    slides.forEach(s => s.classList.remove('active'));
    slides[index].classList.add('active');
    
    currentSlide = index;
    
    // Update progress
    const progress = ((index + 1) / totalSlides) * 100;
    progressFill.style.width = `${progress}%`;
    progressText.textContent = `${index + 1} / ${totalSlides}`;
    
    // Update button states
    prevBtn.disabled = (index === 0);
    
    // Handle quiz logic for next button
    if (isQuizMode && index >= quizStartSlide && index < quizStartSlide + MODULE.quiz.length) {
      const qIndex = index - quizStartSlide;
      nextBtn.disabled = (quizAnswers[qIndex] === undefined);
    } else {
      nextBtn.disabled = (index === totalSlides - 1);
    }
    
    // SCORM bookmark
    scormSetValue('cmi.core.lesson_location', index.toString());
    scormCommit();
    
    // Enter quiz mode
    if (index === quizStartSlide && MODULE.quiz.length > 0) {
      isQuizMode = true;
      quizAnswers = new Array(MODULE.quiz.length);
    }
  }

  function answerQuestion(qIndex, answerIndex, clickedEl) {
    const question = MODULE.quiz[qIndex];
    const isCorrect = answerIndex === question.correct;
    
    quizAnswers[qIndex] = answerIndex;
    
    // Update option states
    const slide = document.getElementById(`quiz-${qIndex}`);
    const options = slide.querySelectorAll('.quiz-option');
    const feedback = slide.querySelector('.quiz-feedback');
    
    options.forEach((opt, i) => {
      opt.classList.add('disabled');
      if (i === question.correct) {
        opt.classList.add('correct');
      } else if (i === answerIndex && !isCorrect) {
        opt.classList.add('incorrect');
      }
    });
    
    // Show feedback
    feedback.style.display = 'block';
    feedback.textContent = isCorrect 
      ? 'Correct.' 
      : 'Not quite. The correct answer is highlighted above.';
    
    // Enable next button
    nextBtn.disabled = false;
    
    // If this was the last question, show results after a delay
    if (qIndex === MODULE.quiz.length - 1) {
      setTimeout(() => {
        showResults();
        goToSlide(currentSlide + 1);
      }, 2000);
    }
  }

  function showResults() {
    const correctCount = quizAnswers.filter((answer, i) => answer === MODULE.quiz[i].correct).length;
    const percentage = Math.round((correctCount / MODULE.quiz.length) * 100);
    const passed = percentage >= MODULE.passingScore;
    
    document.getElementById('results-score').textContent = `${percentage}%`;
    document.getElementById('results-score').className = `results-score ${passed ? 'pass' : 'fail'}`;
    document.getElementById('results-status').textContent = passed ? 'PASSED' : 'FAILED';
    document.getElementById('results-details').textContent = 
      `You answered ${correctCount} out of ${MODULE.quiz.length} questions correctly. ` +
      `You need ${MODULE.passingScore}% to pass.`;
    
    // SCORM reporting
    scormSetValue('cmi.core.score.raw', percentage.toString());
    scormSetValue('cmi.core.score.min', '0');
    scormSetValue('cmi.core.score.max', '100');
    scormSetValue('cmi.core.lesson_status', passed ? 'passed' : 'failed');
    scormCommit();
  }

  function joinWaitlist() {
    const email = document.getElementById('waitlist-email').value;
    console.log('Waitlist signup:', email);
    // In real implementation, this would send to a server
    alert('Thank you! We\'ll be in touch.');
  }

  // SCORM integration
  function initSCORM() {
    function findAPI(win) {
      if (win.API) return win.API;
      if (win.parent && win.parent !== win) return findAPI(win.parent);
      return null;
    }
    
    try {
      SCORM_API = findAPI(window);
      if (SCORM_API) {
        SCORM_API.LMSInitialize('');
        const status = SCORM_API.LMSGetValue('cmi.core.lesson_status');
        if (status === 'not attempted' || status === '') {
          SCORM_API.LMSSetValue('cmi.core.lesson_status', 'incomplete');
          SCORM_API.LMSCommit('');
        }
        const bookmark = SCORM_API.LMSGetValue('cmi.core.lesson_location');
        if (bookmark && bookmark !== '') currentSlide = parseInt(bookmark, 10);
      }
    } catch (e) {
      SCORM_API = null; // standalone mode
    }
  }

  function scormSetValue(key, val) {
    try { if (SCORM_API) SCORM_API.LMSSetValue(key, val); } catch (e) { /* silent */ }
  }
  function scormCommit() {
    try { if (SCORM_API) SCORM_API.LMSCommit(''); } catch (e) { /* silent */ }
  }

  // Preload images for smooth transitions
  function preloadImages() {
    MODULE.slides.forEach(s => {
      if (s.image) {
        const img = new Image();
        img.src = s.image;
      }
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (!nextBtn.disabled) goToSlide(currentSlide + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); if (!prevBtn.disabled) goToSlide(currentSlide - 1); }
  });
  prevBtn.addEventListener('click', () => goToSlide(currentSlide - 1));
  nextBtn.addEventListener('click', () => goToSlide(currentSlide + 1));
  window.addEventListener('beforeunload', function() {
    try {
      if (SCORM_API) { scormSetValue('cmi.core.exit', 'suspend'); SCORM_API.LMSFinish(''); }
    } catch (e) { /* silent */ }
  });

  buildSlides();
  preloadImages();
  initSCORM();
  goToSlide(currentSlide);
})();
</script>
